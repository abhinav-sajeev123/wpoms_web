name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into EC2 and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to the repo
            cd /home/${{ secrets.EC2_USER }}/your-repo-folder

            # 2. Pull the latest code
            git pull origin main

            # 3. Stop and remove the existing container (ignore error if it doesn't exist)
            docker stop my-container-name || true
            docker rm my-container-name || true

            # 4. Build the new image
            docker build -t my-image-name .

            # 5. Run the new container
            docker run -d --name my-container-name -p 80:80 my-image-name